<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Love';
            src: url('love larry ttf.ttf') format('truetype');
            font-weight: normal;

        body{
            font-family: Arial, Helvetica, sans-serif;

        h1{
            font-family: 'Love', 'Times New Roman', Times, serif;

</head>
